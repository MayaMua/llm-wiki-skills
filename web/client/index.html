<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LLM Wiki Viewer</title>
  
  <!-- Modern Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <!-- KaTeX CSS for server-side pre-rendered math support -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
  
  <!-- Mermaid JS for client-side diagram compilation -->
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10.2.4/dist/mermaid.min.js"></script>
  
  <!-- D3.js v7 for custom interactive knowledge graph rendering -->
  <script src="https://d3js.org/d3.v7.min.js"></script>
  
  <style>
    /* Reset & Base System */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    /* Catppuccin Mocha Palette & Semantic Variables */
    :root {
      --ctp-base:     #1e1e2e;
      --ctp-mantle:   #181825;
      --ctp-crust:    #11111b;
      --ctp-surface0: #313244;
      --ctp-surface1: #45475a;
      --ctp-surface2: #585b70;
      --ctp-overlay0: #6c7086;
      --ctp-overlay1: #7f849c;
      --ctp-overlay2: #9399b2;
      --ctp-text:     #cdd6f4;
      --ctp-subtext1: #bac2de;
      --ctp-subtext0: #a6adc8;
      --ctp-lavender: #b4befe;
      --ctp-mauve:    #cba6f7;
      --ctp-blue:     #89b4fa;
      --ctp-teal:     #94e2d5;
      --ctp-green:    #a6e3a1;
      --ctp-yellow:   #f9e2af;
      --ctp-peach:    #fab387;
      --ctp-red:      #f38ba8;
      
      --bg-base: var(--ctp-base);
      --bg-surface: var(--ctp-mantle);
      --bg-deep: var(--ctp-crust);
      
      --border-color: rgba(180, 190, 254, 0.08);
      --border-glowing: rgba(203, 166, 247, 0.25);
      
      --text-primary: var(--ctp-text);
      --text-secondary: var(--ctp-subtext0);
      --text-muted: var(--ctp-overlay1);
      
      --accent-primary: var(--ctp-lavender);
      --accent-hover: var(--ctp-mauve);
      
      --sev-info: var(--ctp-blue);
      --sev-info-bg: rgba(137, 180, 250, 0.15);
      --sev-suggest: var(--ctp-mauve);
      --sev-suggest-bg: rgba(203, 166, 247, 0.15);
      --sev-warn: var(--ctp-peach);
      --sev-warn-bg: rgba(250, 179, 135, 0.15);
      --sev-error: var(--ctp-red);
      --sev-error-bg: rgba(243, 139, 168, 0.15);
      
      --transition-fast: 0.15s cubic-bezier(0.22, 0.61, 0.36, 1);
      --transition-normal: 0.28s cubic-bezier(0.25, 0.8, 0.25, 1);
      
      --glass-bg: rgba(24, 24, 37, 0.55);
      --glass-border: rgba(203, 166, 247, 0.14);
      --glass-shadow: 0 8px 40px rgba(0, 0, 0, 0.45);
    }
    
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-deep);
      color: var(--text-primary);
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    /* Aurora Background radial highlights */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -1;
      background:
        radial-gradient(ellipse 80% 60% at 15% 0%, rgba(203, 166, 247, 0.12) 0%, transparent 55%),
        radial-gradient(ellipse 60% 50% at 85% 10%, rgba(137, 180, 250, 0.08) 0%, transparent 55%),
        radial-gradient(ellipse 90% 70% at 50% 100%, rgba(148, 226, 213, 0.06) 0%, transparent 60%),
        linear-gradient(180deg, var(--ctp-mantle) 0%, var(--ctp-base) 40%, var(--ctp-mantle) 100%);
      pointer-events: none;
    }
    
    /* Delicate background dot mesh grid */
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -1;
      background-image: radial-gradient(rgba(203, 166, 247, 0.025) 1px, transparent 1px);
      background-size: 22px 22px;
      pointer-events: none;
      mask-image: linear-gradient(180deg, rgba(0,0,0,0.6), rgba(0,0,0,0.1));
    }
    
    /* Header Bar with Glassmorphism */
    header {
      background: var(--glass-bg);
      backdrop-filter: blur(24px) saturate(170%);
      -webkit-backdrop-filter: blur(24px) saturate(170%);
      border-bottom: 1px solid var(--glass-border);
      padding: 0.75rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 3.5rem;
      flex-shrink: 0;
      z-index: 5;
      box-shadow: var(--glass-shadow);
    }
    
    .logo-container {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    
    .logo-icon {
      background: var(--accent-primary);
      width: 1.75rem;
      height: 1.75rem;
      border-radius: 0.35rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      color: var(--ctp-crust);
      font-family: 'Outfit', sans-serif;
      font-size: 0.95rem;
    }
    
    .logo-text {
      font-family: 'Outfit', sans-serif;
      font-weight: 700;
      font-size: 1.2rem;
      letter-spacing: -0.02em;
    }
    
    .active-page-title {
      font-size: 0.9rem;
      color: var(--text-secondary);
      font-weight: 500;
      max-width: 400px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    
    /* 3-Pane Main Layout */
    .app-container {
      display: flex;
      flex: 1;
      overflow: hidden;
      position: relative;
    }
    
    /* Sidebar Left with Glassmorphism */
    .sidebar-left {
      width: 18rem;
      background: var(--glass-bg);
      backdrop-filter: blur(24px) saturate(170%);
      -webkit-backdrop-filter: blur(24px) saturate(170%);
      border-right: 1px solid var(--glass-border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      overflow-y: auto;
      box-shadow: var(--glass-shadow);
      transition: width var(--transition-normal), border var(--transition-normal), box-shadow var(--transition-normal);
    }
    
    .sidebar-left.collapsed {
      width: 0 !important;
      border-right: none !important;
      box-shadow: none !important;
      overflow: hidden;
    }
    
    .nav-section {
      padding: 1.25rem 1.25rem 0.5rem 1.25rem;
    }
    
    .nav-section-title {
      font-size: 0.75rem;
      text-transform: uppercase;
      font-weight: 700;
      letter-spacing: 0.1em;
      color: var(--text-muted);
      margin-bottom: 0.75rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      user-select: none;
    }
    
    .nav-section-title::after {
      content: '▾';
      font-size: 0.85rem;
      transition: transform var(--transition-fast);
    }
    
    .nav-section.collapsed .nav-section-title::after {
      transform: rotate(-90deg);
    }
    
    .nav-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
      transition: max-height var(--transition-normal);
      overflow: hidden;
    }
    
    .nav-section.collapsed .nav-list {
      max-height: 0 !important;
      margin-top: 0;
    }
    
    .nav-item {
      display: block;
      padding: 0.5rem 0.75rem;
      font-size: 0.85rem;
      color: var(--text-secondary);
      text-decoration: none;
      border-radius: 0.35rem;
      cursor: pointer;
      transition: all var(--transition-fast);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    
    .nav-item:hover {
      background: hsla(224, 25%, 20%, 0.5);
      color: var(--text-primary);
    }
    
    .nav-item.active {
      background: var(--accent-primary);
      color: white;
      font-weight: 500;
      box-shadow: 0 0 12px var(--border-glowing);
    }
    
    /* Center Content Panel */
    .content-center {
      flex: 1;
      overflow-y: auto;
      background: var(--bg-base);
      padding: 3rem 4rem;
      position: relative;
    }
    
    .markdown-body {
      max-width: 48rem;
      margin: 0 auto;
      line-height: 1.625;
      font-size: 1rem;
    }
    
    /* Markdown Styles */
    .markdown-body h1 {
      font-family: 'Outfit', sans-serif;
      font-size: 2.2rem;
      font-weight: 800;
      margin-bottom: 1.5rem;
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 0.5rem;
      color: var(--text-primary);
    }
    
    .markdown-body h2 {
      font-family: 'Outfit', sans-serif;
      font-size: 1.45rem;
      font-weight: 700;
      margin-top: 2rem;
      margin-bottom: 1rem;
      color: var(--text-primary);
    }
    
    .markdown-body h3 {
      font-family: 'Outfit', sans-serif;
      font-size: 1.15rem;
      font-weight: 600;
      margin-top: 1.5rem;
      margin-bottom: 0.75rem;
    }
    
    .markdown-body p {
      margin-bottom: 1.25rem;
    }
    
    .markdown-body ul, .markdown-body ol {
      margin-bottom: 1.25rem;
      padding-left: 1.5rem;
    }
    
    .markdown-body li {
      margin-bottom: 0.35rem;
    }
    
    .markdown-body blockquote {
      border-left: 4px solid var(--accent-primary);
      background: hsla(250, 80%, 65%, 0.05);
      padding: 0.75rem 1.25rem;
      margin-bottom: 1.25rem;
      border-radius: 0 0.35rem 0.35rem 0;
      color: var(--text-secondary);
    }
    
    .markdown-body code {
      font-family: monospace;
      background: hsla(224, 25%, 20%, 0.6);
      padding: 0.2rem 0.4rem;
      border-radius: 0.25rem;
      font-size: 0.9em;
    }
    
    .markdown-body pre {
      background: HSL(224, 25%, 6%);
      border: 1px solid var(--border-color);
      padding: 1.25rem;
      border-radius: 0.5rem;
      overflow-x: auto;
      margin-bottom: 1.25rem;
    }
    
    .markdown-body pre code {
      background: none;
      padding: 0;
      font-size: 0.875rem;
    }
    
    .markdown-body a {
      color: var(--accent-primary);
      text-decoration: none;
      border-bottom: 1px dashed var(--accent-primary);
      transition: color var(--transition-fast);
    }
    
    .markdown-body a:hover {
      color: var(--accent-hover);
      border-bottom-style: solid;
    }
    
    /* Mermaid diagram layouts */
    .mermaid-container {
      background: HSL(224, 25%, 6%);
      border: 1px solid var(--border-color);
      border-radius: 0.5rem;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      display: flex;
      justify-content: center;
      overflow-x: auto;
    }
    
    /* Math styling adjustments */
    .katex-display {
      overflow-x: auto;
      overflow-y: hidden;
      padding: 0.5rem 0;
    }
    
    /* Sidebar Right: Open Audits list */
    /* Sidebar Right with Glassmorphism */
    .sidebar-right {
      width: 22rem;
      background: var(--glass-bg);
      backdrop-filter: blur(24px) saturate(170%);
      -webkit-backdrop-filter: blur(24px) saturate(170%);
      border-left: 1px solid var(--glass-border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      overflow-y: auto;
      box-shadow: var(--glass-shadow);
      transition: width var(--transition-normal), border var(--transition-normal), box-shadow var(--transition-normal);
    }
    
    .sidebar-right.collapsed {
      width: 0 !important;
      border-left: none !important;
      box-shadow: none !important;
      overflow: hidden;
    }
    
    .audits-header {
      padding: 1.25rem;
      border-bottom: 1px solid var(--border-color);
      font-family: 'Outfit', sans-serif;
      font-size: 1.1rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    
    .audits-badge {
      background: hsla(224, 25%, 25%, 0.8);
      font-size: 0.75rem;
      padding: 0.15rem 0.5rem;
      border-radius: 10px;
      color: var(--text-secondary);
    }
    
    .audits-list {
      padding: 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    
    .audit-card {
      background: hsla(224, 25%, 15%, 0.6);
      border: 1px solid var(--border-color);
      border-radius: 0.5rem;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      transition: transform var(--transition-fast), border-color var(--transition-fast);
    }
    
    .audit-card:hover {
      border-color: var(--border-glowing);
    }
    
    .audit-card-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 0.75rem;
    }
    
    .audit-author {
      font-weight: 600;
      color: var(--text-primary);
    }
    
    .audit-date {
      color: var(--text-muted);
    }
    
    .severity-tag {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: 0.15rem 0.4rem;
      border-radius: 0.25rem;
    }
    
    .severity-tag.info { color: var(--sev-info); background: var(--sev-info-bg); }
    .severity-tag.suggest { color: var(--sev-suggest); background: var(--sev-suggest-bg); }
    .severity-tag.warn { color: var(--sev-warn); background: var(--sev-warn-bg); }
    .severity-tag.error { color: var(--sev-error); background: var(--sev-error-bg); }
    
    .audit-quote {
      border-left: 2px solid var(--border-color);
      padding-left: 0.5rem;
      font-size: 0.8rem;
      color: var(--text-secondary);
      font-style: italic;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    
    .audit-comment {
      font-size: 0.85rem;
      color: var(--text-primary);
      white-space: pre-wrap;
      line-height: 1.4;
    }
    
    .empty-audits {
      text-align: center;
      color: var(--text-muted);
      padding: 3rem 1rem;
      font-size: 0.85rem;
    }
    
    /* Selection Popover */
    #selection-popover {
      position: absolute;
      background: var(--accent-primary);
      color: white;
      border: none;
      padding: 0.4rem 0.8rem;
      font-size: 0.8rem;
      font-weight: 600;
      border-radius: 20px;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(0,0,0,0.5), 0 0 10px var(--border-glowing);
      z-index: 100;
      display: flex;
      align-items: center;
      gap: 0.35rem;
      transform: translate(-50%, -100%);
      pointer-events: auto;
      transition: opacity var(--transition-fast), transform var(--transition-fast);
    }
    
    #selection-popover:hover {
      background: var(--accent-hover);
    }
    
    .hidden {
      display: none !important;
      opacity: 0;
      pointer-events: none;
    }
    
    /* Feedback Modal Overlay with Glassmorphism */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(8, 10, 15, 0.65);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity var(--transition-normal);
    }
    
    .modal-card {
      background: var(--glass-bg);
      backdrop-filter: blur(24px) saturate(170%);
      -webkit-backdrop-filter: blur(24px) saturate(170%);
      border: 1px solid var(--glass-border);
      width: 32rem;
      max-width: 90vw;
      border-radius: 0.75rem;
      box-shadow: var(--glass-shadow);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      animation: modalSlideUp var(--transition-normal) forwards;
    }
    
    @keyframes modalSlideUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    
    .modal-header {
      padding: 1.25rem 1.5rem;
      border-bottom: 1px solid var(--border-color);
      font-family: 'Outfit', sans-serif;
      font-weight: 700;
      font-size: 1.25rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    
    .modal-close-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 1.25rem;
      transition: color var(--transition-fast);
    }
    
    .modal-close-btn:hover {
      color: var(--text-primary);
    }
    
    .modal-body {
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }
    
    .quote-box {
      border-left: 3px solid var(--accent-primary);
      background: hsla(224, 25%, 6%, 0.6);
      padding: 0.75rem 1rem;
      border-radius: 0 0.35rem 0.35rem 0;
      font-size: 0.85rem;
      color: var(--text-secondary);
      font-style: italic;
      max-height: 5.5rem;
      overflow-y: auto;
      line-height: 1.4;
    }
    
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    
    .form-row {
      display: flex;
      gap: 1.25rem;
    }
    
    .form-row .form-group {
      flex: 1;
    }
    
    label {
      font-size: 0.75rem;
      text-transform: uppercase;
      font-weight: 700;
      letter-spacing: 0.05em;
      color: var(--text-secondary);
    }
    
    input[type="text"], textarea {
      background: HSL(224, 25%, 6%);
      border: 1px solid var(--border-color);
      border-radius: 0.35rem;
      padding: 0.6rem 0.75rem;
      color: var(--text-primary);
      font-family: inherit;
      font-size: 0.9rem;
      outline: none;
      transition: border-color var(--transition-fast), box-shadow var(--transition-fast);
    }
    
    input[type="text"]:focus, textarea:focus {
      border-color: var(--accent-primary);
      box-shadow: 0 0 8px var(--border-glowing);
    }
    
    textarea {
      resize: vertical;
      min-height: 6rem;
      line-height: 1.4;
    }
    
    /* Custom Severity Selector */
    .severity-selector {
      display: flex;
      gap: 0.35rem;
    }
    
    .sev-option {
      flex: 1;
      position: relative;
    }
    
    .sev-option input[type="radio"] {
      position: absolute;
      opacity: 0;
      width: 0;
      height: 0;
    }
    
    .sev-label {
      display: block;
      text-align: center;
      padding: 0.55rem 0.25rem;
      font-size: 0.75rem;
      font-weight: 700;
      border-radius: 0.35rem;
      border: 1px solid var(--border-color);
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.02em;
      transition: all var(--transition-fast);
      user-select: none;
    }
    
    .sev-option:nth-child(1) input:checked + .sev-label { border-color: var(--sev-info); background: var(--sev-info-bg); color: var(--sev-info); }
    .sev-option:nth-child(2) input:checked + .sev-label { border-color: var(--sev-suggest); background: var(--sev-suggest-bg); color: var(--sev-suggest); }
    .sev-option:nth-child(3) input:checked + .sev-label { border-color: var(--sev-warn); background: var(--sev-warn-bg); color: var(--sev-warn); }
    .sev-option:nth-child(4) input:checked + .sev-label { border-color: var(--sev-error); background: var(--sev-error-bg); color: var(--sev-error); }
    
    .sev-option:nth-child(1) .sev-label:hover { border-color: var(--sev-info); }
    .sev-option:nth-child(2) .sev-label:hover { border-color: var(--sev-suggest); }
    .sev-option:nth-child(3) .sev-label:hover { border-color: var(--sev-warn); }
    .sev-option:nth-child(4) .sev-label:hover { border-color: var(--sev-error); }
    
    .modal-footer {
      padding: 1rem 1.5rem;
      border-top: 1px solid var(--border-color);
      display: flex;
      justify-content: flex-end;
      gap: 0.75rem;
    }
    
    .btn {
      font-family: inherit;
      font-size: 0.85rem;
      font-weight: 600;
      padding: 0.55rem 1.25rem;
      border-radius: 0.35rem;
      cursor: pointer;
      border: none;
      transition: all var(--transition-fast);
    }
    
    .btn-secondary {
      background: transparent;
      border: 1px solid var(--border-color);
      color: var(--text-secondary);
    }
    
    .btn-secondary:hover {
      background: hsla(224, 25%, 25%, 0.3);
      color: var(--text-primary);
    }
    
    .btn-primary {
      background: var(--accent-primary);
      color: white;
      box-shadow: 0 0 10px var(--border-glowing);
    }
    
    .btn-primary:hover {
      background: var(--accent-hover);
      box-shadow: 0 0 16px var(--border-glowing);
    }
    
    /* Loading Spinner */
    .loading-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--text-secondary);
      gap: 1rem;
    }
    
    .spinner {
      border: 3px solid var(--border-color);
      border-top: 3px solid var(--accent-primary);
      border-radius: 50%;
      width: 2.25rem;
      height: 2.25rem;
      animation: spin 1s linear infinite;
    }
    
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    
    /* D3 Knowledge Graph Aesthetics */
    .graph-link {
      transition: stroke-opacity var(--transition-fast), stroke var(--transition-fast), stroke-width var(--transition-fast);
    }
    .graph-link.link-flowing {
      stroke-dasharray: 6, 4;
      animation: linkFlow 0.8s linear infinite;
    }
    @keyframes linkFlow {
      to {
        stroke-dashoffset: -10;
      }
    }
    .graph-node {
      transition: opacity var(--transition-fast);
    }
  </style>
</head>
<body>
  
  <!-- Top Navigation Header -->
  <header>
    <div class="logo-container">
      <div class="logo-icon">W</div>
      <div class="logo-text">LLM Wiki Viewer</div>
    </div>
    
    <button id="toggle-left-btn" class="btn btn-secondary" style="font-size: 0.75rem; padding: 0.35rem 0.6rem; margin-left: 1.5rem; display: flex; align-items: center; gap: 0.35rem;" title="Toggle Sidebar">
      <span class="arrow">◀</span> Sidebar
    </button>
    
    <button id="graph-view-btn" class="btn btn-secondary" style="font-size: 0.75rem; padding: 0.35rem 0.75rem; display: flex; align-items: center; gap: 0.35rem; margin-left: auto; margin-right: 1.5rem;">
      <span>🌐</span> Knowledge Graph
    </button>
    
    <button id="toggle-right-btn" class="btn btn-secondary" style="font-size: 0.75rem; padding: 0.35rem 0.6rem; margin-right: 1.5rem; display: flex; align-items: center; gap: 0.35rem;" title="Toggle Audits">
      Audits <span class="arrow">▶</span>
    </button>
    
    <div class="active-page-title" id="current-page-header">Select a page...</div>
  </header>
  
  <div class="app-container">
    
    <!-- Left Sidebar: Pages Tree -->
    <aside class="sidebar-left" id="navigation-sidebar">
      <div class="loading-container">
        <div class="spinner"></div>
        <span>Loading pages...</span>
      </div>
    </aside>
    
    <!-- Middle Pane: Rendered Markdown Content -->
    <main class="content-center" id="markdown-container">
      <div class="loading-container">
        <div class="spinner"></div>
        <span>Please select a page from the sidebar to start browsing.</span>
      </div>
    </main>
    
    <!-- Right Sidebar: Open Audits list -->
    <aside class="sidebar-right" id="audits-sidebar">
      <div class="audits-header">
        <span>Open Page Audits</span>
        <span class="audits-badge" id="audits-count">0</span>
      </div>
      <div class="audits-list" id="audits-container">
        <div class="empty-audits">No page loaded</div>
      </div>
    </aside>
    
  </div>
  
  <!-- Floating Selection Add-Feedback Trigger Popover -->
  <button id="selection-popover" class="hidden">
    <span>💬</span> Add feedback
  </button>
  
  <!-- Dialog Overlay Modal Form (Initially hidden) -->
  <div class="modal-overlay hidden" id="feedback-modal">
    <div class="modal-card">
      <div class="modal-header">
        <span>File Feedback Audit</span>
        <button class="modal-close-btn" id="modal-close-x">&times;</button>
      </div>
      <div class="modal-body">
        <div class="quote-box" id="modal-quote"></div>
        
        <div class="form-row">
          <div class="form-group">
            <label for="feedback-author">Author Name</label>
            <input type="text" id="feedback-author" required placeholder="Type your name...">
          </div>
          
          <div class="form-group">
            <label>Severity</label>
            <div class="severity-selector">
              <div class="sev-option">
                <input type="radio" name="severity" id="sev-info" value="info" checked>
                <label for="sev-info" class="sev-label">Info</label>
              </div>
              <div class="sev-option">
                <input type="radio" name="severity" id="sev-suggest" value="suggest">
                <label for="sev-suggest" class="sev-label">Suggest</label>
              </div>
              <div class="sev-option">
                <input type="radio" name="severity" id="sev-warn" value="warn">
                <label for="sev-warn" class="sev-label">Warn</label>
              </div>
              <div class="sev-option">
                <input type="radio" name="severity" id="sev-error" value="error">
                <label for="sev-error" class="sev-label">Error</label>
              </div>
            </div>
          </div>
        </div>
        
        <div class="form-group">
          <label for="feedback-comment">Comment / Feedback</label>
          <textarea id="feedback-comment" placeholder="Describe the issue or proposed change in detail..."></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" id="modal-cancel-btn">Cancel</button>
        <button class="btn btn-primary" id="modal-submit-btn">Submit Audit</button>
      </div>
    </div>
  </div>
  
  <!-- Application Script -->
  <script type="module" src="app.js"></script>
</body>
</html>
